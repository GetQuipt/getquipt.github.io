  /catalog/{pageSize}/{pageNumber}:
    get:
      tags:
        - Catalog API
      summary: Search for product details (paged).
      description: |
        Returns a paginated list of products from the catalog based on search filters.  
      
        **Overview**
        - Use this endpoint to search the product catalog by keywords, categories, manufacturers, brands, and attributes.  
        - Attributes are passed as query parameters with the format `attribute{Suffix}={value}`, where `{Suffix}` corresponds to the attribute code in Quipt.  
      
        **Behavior**
        - Supports multiple filter combinations (keywords, categories, manufacturers, brands, and attributes).  
        - Pagination is controlled with `pageSize` and `pageNumber` path parameters.  
        - If no results match the filters, an empty result set is returned.  
        - Response includes pagination metadata (`pageNumber`, `pageSize`, `totalRecords`, `hasMorePages`).  
      
        **Common use cases**
        - Product search in an e-commerce storefront.  
        - Catalog browsing for internal admin tools.  
        - Filtering products for exports, listings, or reports.
      operationId: catalogItems
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: keywords
          in: query
          description: Search terms to locate a matching item.
          required: false
          schema:
            type: string           
        - name: categories
          in: query
          description: >-
            Comma separated list of categories.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: categoryIds
          in: query
          description: >-
            Comma separated list of Quipt category IDs.
          required: false
          schema:
            type: array
            items:
              type: string  
        - name: manufacturers
          in: query
          description: >-
            Comma separated list of manufacturers.
          required: false
          schema:
            type: array
            items:
              type: string  
        - name: brands
          in: query
          description: >-
            Comma separated list of brands.
          required: false
          schema:
            type: array
            items:
              type: string   
        - name: attribute{Suffix}
          in: query
          description: >-
            Comma separated list of attributes. Replace {Suffix} with the attribute code you want to filter on. 
          required: false
          schema:
            type: array
            items:
              type: string      
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Conditions
                - Facets
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupedCatalogReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory

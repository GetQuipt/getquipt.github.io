      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/returnupdate:
    post:
      tags:
        - Vendor API - Requests
      summary: Update return request.
      description: |
        Updates an existing return request with new actions, reference numbers, notes, or line-level details.
      
        **Overview**
        - This endpoint is used to modify return requests after they have been created.
        - Updates may include:  
          - Changing the request action (e.g., exchange, credit, replacement).  
          - Assigning a new reference number.  
          - Adding or updating notes.  
          - Adjusting line-level return details such as exchange, credit, accept/replacement, warehouse, or tracking.  
        - The system applies updates to the specified request and returns confirmation once processed.
      
        **Behavior**
        - Requires the `Request.Id` to identify the return request being updated.  
        - Supports updating one or more line items in the same request.  
        - Non-specified fields remain unchanged.  
        - Returns an error if the request ID is invalid or cannot be updated.
      operationId: salesRequestsUpdateReturn
      requestBody:
        description: |
          The request body contains one or more **return updates**.  
      
          Each request update includes:
          - **Action** *(required)*: Integer code representing the update action (e.g., approve, deny, exchange).  
          - **Request** *(required)*: Identifies the return request being updated by `Id`.  
          - **NewReferenceNumber** *(optional)*: Assigns or updates a reference number.  
          - **Notes** *(optional)*: Additional comments or context for the update.  
          - **Lines** *(optional)*: Array of line-level updates.  
            - **Exchange**: Specifies exchange details, including new carrier method.  
            - **Credit**: Credit processing details (e.g., whether a restocking fee applies).  
            - **Accept**: Replacement item details (e.g., SKU, vendor info).  
            - **ReturnedTo**: Warehouse and resale readiness details.  
            - **CarrierMethod**: Carrier method used for the returned item.  
            - **TrackingNumber**: Tracking identifier for the returned shipment.  
      
          **Usage**
          - Use this endpoint to apply updates to return requests throughout their lifecycle.  
          - Useful for managing customer returns, exchanges, replacements, and credits at both the header and line levels.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqReturnUpdateJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReqReturnUpdateJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/missingaccessoryupdate:
    post:
      tags:
        - Vendor API - Requests
      summary: Update missing accessory request.
      description: |
        Updates an existing missing accessory request with new actions, notes, reference numbers, or line-level details.
      
        **Overview**
        - This endpoint is used to modify missing accessory requests after they are created.  
        - Updates may include:  
          - Changing the request action (e.g., approve, deny, credit, ship replacement).  
          - Assigning or updating a reference number.  
          - Adding or updating notes.  
          - Adjusting line-level details such as credits, shipments, and tracking.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the request being updated.  
        - Multiple lines may be updated within the same request.  
        - Fields not specified in the update remain unchanged.  
        - Returns an error if the request ID is invalid or cannot be updated.
      operationId: salesRequestsUpdateMissingAccessory
      requestBody:
        description: |
          The request body contains one or more **missing accessory request updates**.  
      
          Each request update includes:
          - **Request** *(required)*: Identifies the request being updated by `Id`.  
          - **Action** *(required)*: Integer code indicating the update action.  
          - **NewReferenceNumber** *(optional)*: Assigns or updates a new reference number.  
          - **Notes** *(optional)*: Additional comments or context.  
          - **Lines** *(optional)*: Line-level updates that may include:  
            - **Credit**: Credit amount details.  
            - **Shipped**: Shipment details including carrier, tracking number, items shipped, and weight.  
      
          **Usage**
          - Use this endpoint to record credits or shipments tied to missing accessory requests.  
          - Helpful in warranty, replacement, and reconciliation workflows.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqMissingAccessoryUpdateJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReqMissingAccessoryUpdateJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/lostshipmentupdate:
    post:
      tags:
        - Vendor API - Requests
      summary: Update lost shipment request.
      description: |
        Updates an existing lost shipment request with new actions, notes, reference numbers, or line-level details.
      
        **Overview**
        - This endpoint is used to manage lost shipment cases after they have been created.  
        - Updates may include:  
          - Assigning a new reference number.  
          - Adding or updating notes.  
          - Setting an action code (e.g., resolve, reopen, escalate).  
          - Updating line-level return details, including warehouse, resale readiness, or whether to create a return.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the lost shipment request being updated.  
        - Supports updating one or more lines within a request.  
        - Non-specified fields remain unchanged.  
        - Returns an error if the request ID is invalid or cannot be updated.
      operationId: salesRequestsUpdateLostShipment
      requestBody:
        description: |
          The request body contains one or more **lost shipment request updates**.  
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for tracking across external systems.  
          - `Requests` *(required)*: Array of request update objects.  
      
          Each request update includes:
          - **Lines** *(optional)*: One or more line-level updates.  
            - **ReturnedTo**: Specifies where the shipment was returned to and additional handling options.  
              - **Warehouse**: Identifies the warehouse by code (and optional Id).  
              - **ReadyForResale**: Indicates whether the returned item is suitable for resale.  
              - **CreateReturn**: Flag indicating if a return request should be automatically created.  
      
          **Usage**
          - Use this endpoint to resolve or update lost shipment cases.  
          - Common in workflows where a lost shipment later arrives at a warehouse or needs to be converted into a return.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqLostShipmentUpdateJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReqLostShipmentUpdateJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/interceptupdate:
    post:
      tags:
        - Vendor API - Requests
      summary: Update intercept request.
      description: |
        Updates an existing intercept request with new actions, reference numbers, notes, or line-level details.
      
        **Overview**
        - An intercept request is raised when an order needs to be stopped or redirected before delivery.  
        - This endpoint allows updates to intercept requests, such as:  
          - Assigning a new reference number.  
          - Adding notes for context.  
          - Setting an action code (e.g., approve, deny, escalate).  
          - Updating line-level handling details, such as warehouse return, resale readiness, or auto-creating a return.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the intercept request being updated.  
        - Supports multiple line updates within a single request.  
        - Fields not included in the payload remain unchanged.  
        - Returns an error if the request ID is invalid or cannot be updated.
      operationId: salesRequestsUpdateIntercept
      requestBody:
        description: |
          The request body contains one or more **intercept request updates**.  
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for batch or external system tracking.  
          - `Requests` *(required)*: Array of intercept request updates.  
      
          Each request update includes:
          - **Request** *(required)*: Identifies the intercept request by `Id`.  
          - **NewReferenceNumber** *(optional)*: Assigns or updates a new reference number.  
          - **Action** *(required)*: Integer code representing the update action.  
          - **Notes** *(optional)*: Additional context or comments.  
          - **Lines** *(optional)*: One or more line-level updates.  
            - **ReturnedTo**: Specifies return handling details if the order or items are intercepted.  
              - **Warehouse**: Identifies the warehouse (by code or Id).  
              - **ReadyForResale**: Indicates whether the intercepted item is fit for resale.  
              - **CreateReturn**: Flag to indicate if a return request should be created automatically.  
      
          **Usage**
          - Use this endpoint to manage the lifecycle of intercept requests.  
          - Commonly applied when redirecting orders back to a warehouse or automatically creating returns after an intercept.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReqInterceptUpdateJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReqInterceptUpdateJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/creditupdate:
    post:
      tags:
        - Vendor API - Requests
      summary: Update credit request.
      description: |
        Updates an existing credit request with new actions, reference numbers, notes, or line-level credit details.
      
        **Overview**
        - A credit request represents a post-sales adjustment such as issuing a partial or full refund.  
        - This endpoint allows updates to existing credit requests, including:  
          - Assigning or updating a reference number.  
          - Adding notes for additional context.  
          - Setting an action code (e.g., approve, deny, escalate).  
          - Updating line-level credit amounts.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the credit request being updated.  
        - Multiple line items may be updated in a single request.  
        - Fields not included in the payload remain unchanged.  
        - Returns an error if the request ID is invalid or cannot be updated.
      operationId: salesRequestsUpdateCredit
      requestBody:
        description: |
          The request body contains one or more **credit request updates**.  
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for tracking across external systems.  
          - `Requests` *(required)*: Array of credit request updates.  
      
          Each request update includes:
          - **Request** *(required)*: Identifies the credit request by `Id`.  
          - **Action** *(required)*: Integer code indicating the update action.  
          - **NewReferenceNumber** *(optional)*: Assigns or updates a new reference number.  
          - **Notes** *(optional)*: Additional context or comments.  
          - **Lines** *(optional)*: One or more line-level updates.  
            - **Credit**: Specifies the credit amount to apply for the line, with `Value` and `Units`.  
      
          **Usage**
          - Use this endpoint to apply or adjust credits tied to existing requests.  
          - Supports workflows where partial refunds or adjustments need to be applied to specific line items.
        content:

      security:
        - quipt_auth:
            - read:feeds 
  /inventory/virtual/{vendorId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Channel API - Virtual Inventory
      summary: Retrieve virtual inventory items (paged).
      description: |
        Returns a paginated list of virtual inventory items for a given merchant, filtered by search parameters.
        **Overview**
        - Virtual inventory items represent product listings provided by vendors or partners.  
        - Use this endpoint to browse inventory items in batches for a specific merchant.  
        - Pagination is controlled with `pageSize` and `pageNumber`.  
      
        **Behavior**
        - Results include key product details (SKU, catalog status, identifiers, pricing, etc.).  
        - If no items match the search parameters, an empty list is returned.  
        - Response includes pagination metadata (`PageNumber`, `Total`, `HasMorePages`).  
      
        **Common use cases**
        - Displaying a merchant’s catalog in an admin portal.  
        - Syncing vendor inventory with your own system.  
        - Auditing catalog status and pricing across merchants.
      operationId: virtualInventory
      parameters:
        - name: vendorId
          in: path
          description: The vendor to lookup. Can be the partner reference or the internal id.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: catalogStatus
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            0 = New<br/>
            10 = Received<br/>
            20 = Accepted<br/>
            30 = Rejected<br/>
            40 = Published
          required: false
          schema:
            type: array
            items:
              type: string
        - name: inventoryStatus
          in: query
          description: >-
            A comma separated list of statuses.<br/>
            0 = New<br/>
            10 = Received<br/>
            20 = Accepted<br/>
            30 = Rejected; Does not exist<br/>
            31 = Rejected; Unauthorized<br/>
            32 = Rejected; already mapped<br/>
            33 = Rejected Unknown<br/>
          required: false
          schema:
            type: array
            items:
              type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null. 
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Catalog
                - Details
                - Freight
                - Properties
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryVirtualReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:feeds

openapi: 3.0.3
info:
  title: Quipt - OpenAPI 3.0
  description: >-
    View the [wiki](https://getquipt.github.io) for more details.
  version: 2.0.0
servers:
  - url: https://api.getquipt.com/v2
tags:
  - name: Vendor API - Inventory
    description: >- 
      Perform vendor workflows. 
      The inventory services below provide the ability to manage inventory listings within Quipt. 
      The provided services can be used manage everything from quantity synchronization to creating, publishing, and listing the inventory on partner sites. 
    externalDocs:
      description: Find out more about a vendor inventory integration.
      url: https://getquipt.github.io/vendor-api.html#inventory
  - name: Vendor API - Orders
    description: >-
      The order services provide the ability to manage orders expected to be fulfilled by Quipt vendors. 
      The provided services may be used to download, acknowledge, ship, invoice, and cancel orders.
    externalDocs:
      description: Find out more about a vendor order integration.
      url: https://getquipt.github.io/vendor-api.html#orders  
  - name: Vendor API - Shipments
    description: >-
      The shipment services provide a mechanism to manage shipments if your company is using ‘Ship via Quipt’.
      The primary purpose is to download the necessary packing and shipment documents. 
    externalDocs:
      description: Find out more about a vendor shipment integration.
      url: https://getquipt.github.io/vendor-api.html#shipments
  - name: Vendor API - Requests
    description: >-
      The request services below provide the ability to manage requests expected to be completed by Quipt vendors. 
      The provided services can be used to download, acknowledge, and close requests. 
    externalDocs:
      description: Find out more about a vendor request integration.
      url: https://getquipt.github.io/vendor-api.html#requests  
  - name: Channel API - Virtual Inventory
    description: >-
      The inventory services below provide the ability to manage virtual inventory listings within Quipt.
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#inventory
  - name: Channel API - Orders
    description: >-
      The order services provide the ability to manage orders expected to be fulfilled by Quipt vendors. 
      The provided services may be used to download, acknowledge, ship, invoice, and cancel orders. 
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#orders
  - name: Channel API - Requests
    description: >-
      The request services below provide the ability to manage requests expected to be completed by Quipt vendors. 
      The provided services can be used to download, acknowledge, and close requests.
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#requests     
  - name: Catalog API
    description: Search product catalog.
  - name: Notification API
    description: >-
      Within Quipt users may subscribe to a defined set of events that occur throughout the application. 
      When an event is fired a notification is sent to the user. 
      The following API endpoints allow the user to access the notifications generated. 
      Currently the endpoints only allows the user to monitor for new messages and archive those that are no longer needed.

      Sample use cases.

      - Tracking movement through any work flow, ie Orders.

      - Monitor for changes, including price and quantity.
  - name: Carrier API
    description: >-
      Navigate the available carriers and related methods they support. **No authorization required for the endpoints listed below.**
    externalDocs:
      description: View sheet with all carriers and methods.
      url: https://docs.google.com/spreadsheets/d/1qqNOVK_8K12AGUfIlGtWngTC6atZ46UYuurWLPxplpQ
  - name: Taxonomy API
    description: >-
      Navigate our taxonomy. **No authorization required for the endpoints listed below.**
      Categories are arranged in a tree structure, where:<br/>
      - Each category has a unique id.<br/>
      - A category can have multiple child categories.<br/>
      - A category must have IsLeaf: true to have a product assigned to it.
      - Any category may have Attributes associated, but refer to categories with IsLeaf: true to see those required for a category.
    externalDocs:
      description: View taxonomy.
      url: https://getquipt.github.io/taxonomy.html  
paths:
  /inventory/physical:
    post:
      tags:
        - Vendor API - Inventory
      summary: Add or update items.
      description: Add or update items.
      operationId: addUpdateInventoryItems
      requestBody:
        description: >-
          Create and update inventory items. This action may be applied to both
          complete and incomplete inventory items. At a minimum the SKU is
          required, likewise include as many properties as possible via API, the
          rest may be completed within the Quipt web application.
          
          The result of this call creates a job that is processed asynchronously. Retain the ReportId and use getAddUpdateInventoryItemsReport to monitor the job's progress.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostYourInventoryReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostYourInventoryResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:inventory
  /inventory/physical/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Get job report details by ReportId.  
      description: This service allows a partner to retrieve the detailed report generated when the ‘Create/Update Inventory’ service is used. The result of ‘Create/Update Inventory’ returns the {id} used to retrieve the report from this service.
      operationId: getAddUpdateInventoryItemsReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the addUpdateInventoryItems response.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPostYourInventoryReportResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory  
  /inventory/physical/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Get physical inventory items.
      description: >-
        Get a paged list of inventory items based on search parameters. 
        The service returns all inventory records created within Quipt. This includes both complete and incomplete inventory items.
      operationId: getPhysicalInventory
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: skus
          in: query
          description: Comma separated list of SKUs to lookup.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: ids
          in: query
          description: Comma separated list of ids to lookup.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Catalog
                - Feeds
                - Comments
                - History
                - Report
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetYourInventoryResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory
  /inventory/physical/id/{id}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Get physical inventory item by id.
      description: Retrieve a specific physical inventory item by the Quipt identifier.
      operationId: getPhysicalInventoryById
      parameters:
        - name: id
          in: path
          description: The id to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Catalog
                - Feeds
                - Comments
                - History
                - Report
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory
  /inventory/GroupAndEnrich:
    post:
      tags:
        - Vendor API - Inventory
      summary: Group and enrich inventory items.
      description: >-
          The endpoint accepts an uploaded inventory file, aggregated by category, along with a selected template by name. The service parses the file, groups related inventory lines according to the template configuration, and enriches the data using Quipt’s catalog, partner pricing data, and the partne's existing inventory records.
          The result is a normalized dataset containing matched Quipt SKUs, grouped inventory units, partner pricing insights, and an estimated recovery value based on Quipt’s pricing model.  
      operationId: InventoryGroupAndEnrich
      requestBody:
        description: Data to upload and template name to use for grouping and enriching the inventory data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCompactCatalogGroupAndEnrichReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostCompactCatalogGroupAndEnrichResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:inventory
  /inventory/GroupAndEnrich/report/{reportId}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Get group and enrich job report details by ReportId.  
      description: This service allows a partner to retrieve the detailed report generated when the ‘Group and Enrich Inventory’ service is used. The result of ‘Group and Enrich Inventory’ returns the {reportId} used to retrieve the report from this service.
      operationId: getGroupAndEnrichInventoryReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the groupAndEnrichInventory response.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation. Expect response Paging = null. No paging is used for this endpoint as the full results are returned in a single document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCompactCatalogGroupAndEnrichImportReportResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory  
  /orders/fulfillment/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Get orders.
      description: Retrieve a paged list of orders placed by a channel.
      operationId: getFulfillmentOrders
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: orderStatus
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            2 = Pending<br/>
            4 = Open<br/>
            8 = Shipped<br/>
            16 = Canceled
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/GetPurchaseOrderResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/id/{id}:
    get:
      tags:
        - Vendor API - Orders
      summary: Get order by id.
      description: Retrieve an order by the Quipt identifier.
      operationId: getFulfillmentOrdersById
      parameters:
        - name: id
          in: path
          description: The id to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/PurchaseOrderResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/po/{channelIdOrCode}/{poNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Get order by purchase order number.
      description: Retrieve an order by the channel’s original order number.
      operationId: getFulfillmentOrdersByPO
      parameters:
        - name: channelIdOrCode
          in: path
          description: The id or partner reference to lookup.
          required: true
          schema:
            type: string
        - name: poNumber
          in: path
          description: The purchase order number to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/channel/{channelIdOrCode}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Get orders by channel.
      description: Retrieve a paged list of orders received by a specific channel.
      operationId: getFulfillmentOrdersByChannel
      parameters:
        - name: channelIdOrCode
          in: path
          description: The id or partner reference to lookup.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: orderStatus
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            2 = Pending<br/>
            4 = Open<br/>
            8 = Shipped<br/>
            16 = Canceled
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetPurchaseOrderResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/acknowledge:
    post:
      tags:
        - Vendor API - Orders
      summary: Acknowledge orders.
      description: >-
         Acknowledge an order. Use service provides the mechanisms to either accept and reject an order.
      operationId: ackFulfillmentOrders
      requestBody:
        description: >-
          Accept or reject order items to let vendor know what you are doing with the order.
          
          The result of this call creates a job that is processed asynchronously. Retain the ReportId and use getUpdateVirtualInventoryItemsReport to monitor the job's progress.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPurchaseOrderAcknowledgementReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPurchaseOrderAcknowledgementResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders
  /orders/fulfillment/ship:
    post:
      tags:
        - Vendor API - Orders
      summary: Ship orders.
      description: >-
         Apply shipment details to an order. Invoice details can be set as well.
      operationId: shipFulfillmentOrders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPurchaseOrderShipmentReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPurchaseOrderShipmentResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders   
  /orders/fulfillment/invoice:
    post:
      tags:
        - Vendor API - Orders
      summary: Invoice orders.
      description: >-
          Invoice shipped orders. 
          Invoicing an order is required, but it is not required to be completed using this service. 
          If this flow cannot be supported, turn 'On' auto invoicing within company settings.
      operationId: invoiceFulfillmentOrders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPurchaseOrderInvoiceReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPurchaseOrderInvoiceResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders
  /orders/fulfillment/archive:
    post:
      tags:
        - Vendor API - Orders
      summary: Archive orders.
      description: >-
        The primary purpose of archiving an order is to remove it from the lists that are obtained using ‘Get Orders’ and ‘Get Orders By Channel’.
        This mechanism is not required, and will be automatically applied after 30 days.
      operationId: archiveFulfillmentOrders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPurchaseOrderFulfillmentArchiveReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPurchaseOrderFulfillmentArchiveResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders     
  /orders/fulfillment/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Get job report details by ReportId.  
      description: >-
        This service allows a partner to retrieve the detailed report generated when any of the action services are used. 
        The result of ‘Acknowledge Order’, ‘Ship Order’, ‘Invoice Order’, and ‘Archive Order’ returns the {id} used to retrieve the report from this service.
      operationId: getUpdateFulfillmentOrdersReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the addUpdateInventoryItems response.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPurchaseOrderReportResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders  
  /orders/shipment/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Shipments
      summary: Get shipments.
      description: Retrieve a paged list of shipment records.
      operationId: getFulfillmentShipments
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: statuses
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            2 = Pending<br/>
            32 = New<br/>
            128 = Ready<br/> 
            512 = Generating<br/>
            1024 = Generated<br/> 
            4096 = Exported<br/>
            16384 = Printed<br/>
            131072 = Pickup Requested<br/>
            524288 = Picked Up<br/>
            2097152 = Error<br/>
            8388608 = Canceled
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: orderIds
          in: query
          description: >- 
            A comma separated list of order ids.
          required: false
          schema:
            type: array
            items:
              type: string  
        - name: warehouseIds
          in: query
          description: >- 
            A comma separated list of warehouse ids.
          required: false
          schema:
            type: array
            items:
              type: string      
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices 
                - PackingSlips
                - ShipByTruckRequests
                - Labels
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetShipmentResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:shipments
  /orders/shipment/id/{id}:
    get:
      tags:
        - Vendor API - Shipments
      summary: Get shipment by id.
      description: Get shipment by id.
      operationId: getFulfillmentShipmentsById
      parameters:
        - name: id
          in: path
          description: The id to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices 
                - PackingSlips
                - ShipByTruckRequests
                - Labels
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipmentResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/shipment/acknowledge:
    post:
      tags:
        - Vendor API - Shipments
      summary: Acknowledge shipments.
      description: >-
          This services allows a partner to acknowledge the receipt of a shipment.
      operationId: ackFulfillmentShipments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostShipmentAcknowledgementReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostShipmentAcknowledgementResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:shipments
  /orders/shipment/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Shipments
      summary: Get job report details by ReportId.  
      description: >-
        This service allows a partner to retrieve the detailed report generated when any of the action services are used. 
        The result of ‘Acknowledge Shipment’ returns the {id} used to retrieve the report from this service.
      operationId: getUpdateFulfillmentShipmentsReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by action response.
          required: true
          schema:
            type: string

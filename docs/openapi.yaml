        - Supports pagination through the `pageSize` and `pageNumber` path parameters.  
        **Behavior**
        - Shipments are returned in a consistent order (commonly by `createdAt` or `shippedAt`).  
        - If the requested page exceeds the number of available shipments, an empty list is returned.  
        - Pagination metadata (`PageNumber`, `Total`, `HasMorePages`) is included in the response.  
  
        **Common use cases**

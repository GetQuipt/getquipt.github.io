          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategoryAttributeResults'
        '400':
          description: Invalid request.
components:
  schemas:
    GetYourInventoryResults:
      type: object
      additionalProperties: false
      properties:
        TransactionId:
          type: string
          x-nullable: true
        TransactionTime:
          type: string
          format: date-time
        Success:
          type: boolean
          description: Gets a value indicating whether the operation completed without any fatal errors.
        Messages:
          type: array
          description: Collection of messages.
          x-nullable: true
          items:
            $ref: '#components/schemas/Message'
        Paging:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/PaginationResult'
        Result:
          type: array
          x-nullable: true
          items:
            $ref: '#components/schemas/InventoryResult'
    Message:
      type: object
      description: >-
        Represents a structured message containing a code, descriptive text, and severity level for use in API responses or

        application notifications.
      additionalProperties: false
      properties:
        Code:
          type: string
          description: The message code.
          x-nullable: true
        Text:
          type: string
          description: The message text.
          x-nullable: true
        Severity:
          description: The severity of the message.
          oneOf:
          - $ref: '#components/schemas/SeverityType'
    SeverityType:
      type: integer
      description: >-
        Specifies the severity level for a message.


        0 = Info

        1 = Warning

        2 = Fatal
      x-enumNames:
      - Info
      - Warning
      - Fatal
      enum:
      - 0
      - 1
      - 2
    PaginationResult:
      type: object
      description: Pagination information for paged results.
      additionalProperties: false
      properties:
        PageNumber:
          type: integer
          description: The current page number.
          format: int32
        Total:
          type: integer
          description: The total records available.
          format: int32
        HasMoreRecords:
          type: boolean
          description: Whether or not an additional page is available.
    InventoryResult:
      type: object
      additionalProperties: false
      properties:
        MapId:
          type: string
          description: This value is generated by Quipt and is used to communicate sku details with the channel partners.
          x-nullable: true
        Catalog:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/CatalogExtended'
        MinPurchaseQuantity:
          type: integer
          description: The minimum number of units that must be purchased. (Not currently enforced.)
          format: int32
          x-nullable: true
        MultiplePurchaseQuantity:
          type: integer
          description: The quantity multiple that must be purchased. (Not currently enforced.)
          format: int32
          x-nullable: true
        LeadTimeInDays:
          type: integer
          description: The number of days needed to ship inventory.
          format: int32
          x-nullable: true
        UnitsPerCarton:
          type: integer
          description: The number of units that can be combined into a single shipment.
          format: int32
          x-nullable: true
        UserDefined1:
          type: string
          description: A custom field that can be used to move data through an inventory item.
          x-nullable: true
        UserDefined2:
          type: string
          description: A custom field that can be used to move data through an inventory item.
          x-nullable: true
        Notes:
          type: string
          description: The last comment applied to the inventory item.
          x-nullable: true
        Tags:
          type: array
          description: Word or phrase that can be used to locate the item.
          x-nullable: true
          items:
            type: string
        Weight:
          description: The shipping weight of a single unit.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Weight'
        Dimensions:
          description: The shipping dimensions of a single unit. Most carriers now ship using dimensional weight, so take care to provide an accurate value.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/DimensionsRectangle'
        DropShipOption:
          description: >-
            Flag whether or not an item can be drop shipped to end users, or must be shipped to a reseller.

            (No = 0, Only = 5, Yes = 10) (Not currently enforced.)
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/DropShipOptionType'
        Locations:
          type: array
          description: The physical locations where the inventory resides.
          x-nullable: true
          items:
            $ref: '#components/schemas/Location'
        Id:
          type: string
          description: The Quipt assigned id.
          format: guid
        SKU:
          type: string
          description: The SKU that is provided by the vendor.
          x-nullable: true
        Cost:
          description: The cost of the item to the vendor. This value is used to provide profit reporting. To exclude tracking enter a value of 0.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Amount'
        Feeds:
          type: array
          description: The channel specific pricing details.
          x-nullable: true
          items:
            $ref: '#components/schemas/Feed'
        Pricing:
          description: Pricing to apply to all channels. Otherwise leave null.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Pricing'
        Flags:
          type: integer
          format: int32
        Status:
          description: The items current status. (New = 0, Completed = 10, Discontinued = 20, Published = 30, Outsourced = 40)
          oneOf:
          - $ref: '#components/schemas/InventoryStatusType'
        ErrorCount:
          type: integer
          format: int32
        Comments:
          type: array
          x-nullable: true
          items:
            $ref: '#components/schemas/Comment'
        Vendor:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/CompanyBase'
        Report:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/ReportDetails'
        History:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/HistoryDetails'
    CatalogExtended:
      type: object
      additionalProperties: false
      properties:
        Id:
          type: string
          description: The Quipt generated identifier.
          format: guid
          x-nullable: true
        Title:
          type: string
          description: The item title.
          maxLength: 100
          x-nullable: true
        AltTitle:
          type: string
          description: An alternate title 1.
          maxLength: 100
          x-nullable: true
        AltTitle2:
          type: string
          description: An alternate title 2.
          maxLength: 100
          x-nullable: true
        Manufacturer:
          description: The manufacturer.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/ManufacturerBase'
        Brand:
          description: The brand.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/ManufacturerBase'
        SKUs:
          type: array
          description: One or more sku identifiers for the item.
          x-nullable: true
          items:
            $ref: '#components/schemas/SKU'
        CountryOfOrigin:
          description: The country of origin.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Country'
        Category:
          description: The category.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/CategoryBase'
        Attributes:
          type: array
          description: The attributes collected detailing the item.
          x-nullable: true
          items:
            $ref: '#components/schemas/Attribute'
        Pricing:
          description: The MSRP and SRP of the item.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/CatalogPricing'
        Features:
          type: array
          description: A list of features.
          x-nullable: true
          items:
            type: string
        SpecSheetURL:
          type: string
          description: The URL to specification details.
          x-nullable: true
        Description:
          type: string
          description: A long description of the item.
          x-nullable: true
        PrimaryImage:
          description: The primary image.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/ImageAsset'
        AdditionalImages:
          type: array
          description: The list of additional images.
          x-nullable: true
          items:
            $ref: '#components/schemas/ImageAsset'
        SwatchImages:
          type: array
          description: The list of swatch images.
          x-nullable: true
          items:
            $ref: '#components/schemas/SwatchAsset'
        Documents:
          type: array
          description: The list of documents.
          x-nullable: true
          items:
            $ref: '#components/schemas/Asset'
        Tags:
          type: array
          description: A list of words or phrases that aid in text searches.
          x-nullable: true
          items:
            type: string
        VersionNumber:
          type: integer
          description: This property is only read-only. It is incremented with each catalog item change.
          format: int32
        IsBundle:
          type: boolean
          x-nullable: true
        Flags:
          type: integer
          format: int32
        Weight:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Weight'
        Dimensions:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/DimensionsRectangle'
        Warranty:
          description: Warranty information.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Warranty'
        Support:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Support'
        Condition:
          description: The condition details.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/ConditionBase'
        Packaging:
          description: The packaging details.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/PackagingBase'
        InBox:
          type: array
          description: A list of package contents.
          x-nullable: true
          items:
            type: string
        Quipt.Business.IHasCatalogMatchTo.MatchTo:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/CatalogMatchTo'
        SKUsMatrix:
          type: array
          x-nullable: true
          items:
            $ref: '#components/schemas/SKU'
    ManufacturerBase:
      type: object
      additionalProperties: false
      properties:
        Id:
          type: string
          description: The Quipt generated identifier.
          format: guid
          x-nullable: true
        Name:
          type: string
          description: The name.
          x-nullable: true
    SKU:
      type: object
      additionalProperties: false
      properties:
        Type:
          $ref: '#components/schemas/SKUType'
        Value:
          type: string
          x-nullable: true
    SKUType:
      type: integer
      description: >-
        0 = None

        1 = ChannelId

        5 = MPN

        10 = UPC

        15 = ISBN

        20 = GTIN

        100 = ChannelId_SEC

        101 = MPN_SEC

        102 = UPC_SEC

        103 = GTIN_SEC
      x-enumNames:
      - None
      - ChannelId
      - MPN
      - UPC
      - ISBN
      - GTIN
      - ChannelId_SEC
      - MPN_SEC
      - UPC_SEC
      - GTIN_SEC
      enum:
      - 0
      - 1
      - 5
      - 10
      - 15
      - 20
      - 100
      - 101
      - 102
      - 103
    Country:
      type: object
      description: >-
        Country of origin for a product. 

        The country can be specified by ISO code or name. 

        When used in the request only provide one of the properties, ISO, ISO3 or Name.
      additionalProperties: false
      properties:
        ISO:
          type: string
          description: The [2 character code](https://www.iban.com/country-codes) of the product's country of origin.
          maxLength: 2
          minLength: 2
          x-nullable: true
        ISO3:
          type: string
          description: The [3 character code](https://www.iban.com/country-codes) of the product's country of origin.
          maxLength: 3
          minLength: 3
          x-nullable: true
        Name:
          type: string
          description: The name of the product's country of origin.
          maxLength: 100
          x-nullable: true
    CategoryBase:
      type: object
      description: Represents a category, providing common properties such as identifier and name. The category is used to classify inventory items and is based on the taxonomy API.
      additionalProperties: false
      properties:
        Id:
          type: string
          description: The internal category id. Reference taxonomy API for value.
          format: guid
          x-nullable: true
        Name:
          type: string
          description: The category name. If used to perform inventory item maintenance, you must include the long name.
          x-nullable: true
    Attribute:
      type: object
      description: Represents a catalog attribute with associated metadata, values, and section details.
      additionalProperties: false
      properties:
        Id:
          type: string
          description: The Quipt generated identifier.
          format: guid
          x-nullable: true
        Code:
          type: string
          description: The attribute code.
          x-nullable: true
        Name:
          type: string
          description: The attribute name.
          x-nullable: true
        Value:
          type: array
          description: The attribute value(s).
          x-nullable: true
          items:
            type: string
        Section:
          description: The section.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/SectionDetails'
        IsOption:
          type: boolean
          description: A value indicating whether the current attribute is an option attribute.
    SectionDetails:
      type: object
      description: Represents a details of attributes section, including its unique identifier and name.
      additionalProperties: false
      properties:
        Id:
          type: string
          description: The Quipt generated identifier.
          format: guid
        Name:
          type: string
          description: The section name.
          x-nullable: true
    CatalogPricing:
      type: object
      description: >-
        Represents pricing information for a catalog item, including manufacturer and suggested retail prices and

        related metadata.
      additionalProperties: false
      properties:
        MSRP:
          description: The manufacturer's suggested retail price (MSRP) for the item.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Amount'
        MSRPURL:
          type: string
          description: The web location where the MSRP is listed.
          x-nullable: true
        SRP:
          description: The suggested retail price (SRP) for the item.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/Amount'
    Amount:
      type: object
      description: Monetary amount.
      additionalProperties: false
      properties:
        Value:
          type: number
          description: The amounts value.
          format: decimal
        Units:
          description: The unit of measure for the amount.
          oneOf:
          - $ref: '#components/schemas/CurrencyUnitType'
    CurrencyUnitType:
      type: integer
      description: >-
        Currency.


        0 = USD
      x-enumNames:
      - USD
      enum:
      - 0
    ImageAsset:
      type: object
      description: Image asset.
      additionalProperties: false
      properties:
        Id:
          type: string
          description: Internal asset id.
          format: guid
          x-nullable: true
        URL:
          type: string
          description: URL to download the asset.
          x-nullable: true
        Type:
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/AssetType'
        Name:
          type: string
          description: Asset name.
          maxLength: 255
          x-nullable: true
        Description:
          type: string
          description: Asset description.
          x-nullable: true
        Flags:
          type: integer
          format: int32
        Height:
          type: integer
          format: int32
          x-nullable: true
        Width:
          type: integer
          format: int32
          x-nullable: true
        Resolution:
          type: integer
          format: int32
          x-nullable: true
    AssetType:
      type: integer
      description: >-
        0 = Image

        1 = Document

        2 = ShippingDocument

        16 = BatchRequest

        1024 = Unknown
      x-enumNames:
      - Image
      - Document
      - ShippingDocument
      - BatchRequest
      - Unknown
      enum:
      - 0
      - 1
      - 2
      - 16
      - 1024
    SwatchAsset:
      type: object
      additionalProperties: false
      properties:
        Height:
          type: integer
          format: int32
          x-nullable: true
        Width:
          type: integer
          format: int32
          x-nullable: true
        Resolution:
          type: integer
          format: int32
          x-nullable: true
        Type:
          description: The asset type.
          x-nullable: true
          oneOf:
          - $ref: '#components/schemas/AssetType'
        Id:
          type: string
          description: Internal asset id.
          format: guid
          x-nullable: true
        URL:
          type: string
          description: URL to download the asset.
          x-nullable: true
        Name:
          type: string
          description: Asset name.
          maxLength: 255
          x-nullable: true
        Description:
          type: string
          description: Asset description.
          x-nullable: true
        Flags:
          type: integer
          format: int32
        AttributeCode:
          type: string
          x-nullable: true
    Asset:
      type: object
      description: Asset.
      additionalProperties: false
      properties:
        Id:
          type: string
          description: Internal asset id.

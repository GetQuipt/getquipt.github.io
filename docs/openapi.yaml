  /requests/fulfillment/cancel:
    post:
      tags:
        - Vendor API - Requests
      summary: Cancel request.
      description: |
        Cancels an existing fulfillment request, either in full or at the line level.
      
        **Overview**
        - A cancellation request may apply to the entire fulfillment request or specific line items.  
        - Requires a reason code and allows optional free-text explanation.  
        - `ForceCancelation` can be used to override restrictions that might normally prevent cancellation.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the fulfillment request being cancelled.  
        - Cancelling specific lines leaves other lines unaffected.  
        - Returns an error if the request ID is invalid, or cancellation is not permitted.
      operationId: salesRequestsCancel
      requestBody:
        description: |
          The request body contains one or more **cancel request objects**.
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for external system tracking.  
          - `Requests` *(required)*: Array of cancellation instructions.  
      
          Each cancellation request includes:
          - **Request** *(required)*: Identifies the fulfillment request to cancel by `Id`.  
          - **Reason** *(required)*: Structured reason for the cancellation.  
            - `Id`: Unique identifier for the reason (nullable).  
            - `Code`: Reason code (e.g., `CUSTREQ` = customer requested).  
            - `Text`: Optional free-text explanation.  
          - **ForceCancelation** *(optional)*: Boolean flag to override restrictions and force cancellation.  
          - **Lines** *(optional)*: Array of line items to cancel. If omitted, the entire request is cancelled. 
          **Usage**
          - Use this endpoint to cancel requests initiated by customers or system events.  
          - Can cancel all lines (full request) or specific lines.  
          - Useful in workflows such as customer cancellation, inventory issues, or fraud prevention.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReqCancelJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReqCancelJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/archive:
    post:
      tags:
        - Vendor API - Requests
      summary: Archive requests.
      description: |
        Moves one or more fulfillment requests into an **archived state**.  
      
        **Overview**
        - Archived requests are retained for record-keeping but excluded from active processing.  
        - Archived requests can still be retrieved by ID if needed.  
        - Useful for lifecycle management once requests are resolved or no longer active.  
      
        **Behavior**
        - Requires the request `Id` for each request to archive.  
        - Multiple requests can be archived in a single call.  
        - Returns success/failure for each processed request.
      operationId: salesRequestsArchive
      requestBody:
        description: |
          The request body specifies one or more fulfillment requests to archive.  
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for external system tracking.  
          - `Requests` *(required)*: Array of requests to archive.  
            - **Id** *(required)*: Unique identifier of the fulfillment request to be archived.  
      
          **Usage**
          - Use this endpoint to move resolved or inactive requests into archive state.  
          - Helps reduce clutter in active request views while preserving history.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqArchiveJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReqArchiveJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /requests/fulfillment/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Requests
      summary: Retrieve job report results by ReportId.  
      description: |
        Returns the results of a previously submitted **Acknowledgement**, **Cancel**, **Archive**, **ReturnUpdate**, **MissingAccessoryUpdate**, **LostShipmentUpdate**, **InterceptUpdate**, or **CreditUpdate** job.  
  
        **Overview**
        - Use this endpoint to monitor the status and results of asynchronous request import jobs.  
        - Each job is identified by a `ReportId` returned from the initial `/requests/fulfillment` request.  
        - Reports may contain success/failure details for each processed item.  
  
        **Behavior**
        - If the job is still processing, the response includes a `Status`.  
        - Once complete, the report includes item-level results.  
        - Pagination allows retrieval of large job results in chunks.  
  
        **Common use cases**
        - Poll for job completion before updating UI or triggering follow-up processes.  
        - Retrieve error messages for failed items to correct and resubmit.
      operationId: salesRequestsReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the POST response.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReqJobReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:shipments
  /inventory/virtual/acknowledge:
    post:
      tags:
        - Channel API - Virtual Inventory
      summary: Acknowledge virtual inventory items.
      description: |
        Updates the status of virtual inventory items to notify the vendor whether the item has been listed for sale or if there is an issue preventing it from being listed.  
      
        **Overview**
        - Use this endpoint to communicate listing acknowledgements back to the vendor.  
        - Supports two main acknowledgement scenarios:  
      
          **If listed for sale**
          - `ARP`: *(optional)* Current sale price.  
          - `CatalogStatus`: Must be `40` (listed).  
          - `MapId`: *(optional)* Internal identifier for your system.  
          - `MapURL`: *(optional)* The URL of the item on your site.  
      
          **If there is an issue**
          - `CatalogStatus`: Must be `30` (issue).  
          - `Messages`: Reason(s) why the item is not listed.  
      
        **Behavior**
        - The request creates an asynchronous job.  
        - The response contains a `ReportId`.  
        - Use `/inventory/virtual/report/{reportId}` (or equivalent endpoint) to monitor job progress.
      operationId: virtualInventoryUpdate
      requestBody:
        description: |
          The request body specifies one or more virtual inventory items to acknowledge.  
      
          Each acknowledgement includes:
          - **CatalogStatus** *(required)*: Status of the item.  
            - `40` = Item is listed for sale.  
            - `30` = Item has an issue.  
          - **ARP** *(optional when listed)*: Current sale price.  
          - **MapId** *(optional when listed)*: Internal identifier for your system.  
          - **MapURL** *(optional when listed)*: Link to the item on your site.  
          - **Messages** *(required when issue)*: Explanation of why the item cannot be listed.  
      
          **Usage**
          - Use when synchronizing your catalog with the vendor.  
          - Ensures the vendor knows which items are available and which have issues.  
          - Responses should be monitored using the job report API.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryVirtualAckJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryVirtualAckJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:feeds
  /inventory/virtual/report/{reportId}/{pageSize}/{pageNumber}:

  /notifications/update:
    post:
      tags:
        - Notification API
      summary: Update notifications.
      description: |
        Updates one or more notifications by marking them as **read**, **unread**, or **archived**.  
      
        **Overview**
        - This endpoint allows batch updates of notification state.  
        - Notifications can be updated simultaneously across multiple states (e.g., mark some as read, others as archived).  
      
        **Behavior**
        - Accepts three optional arrays of notification IDs: `Unread`, `Read`, and `Archive`.  
        - At least one of these arrays must contain values.  
        - Supports bulk operations across multiple notifications.  
        - Notifications updated to `Archive` will no longer appear in `/notifications/{pageSize}/{pageNumber}` queries.  
      
        **Common use cases**
        - Marking notifications as read after they’ve been processed.  
        - Reopening a notification by marking it unread.  
        - Archiving completed notifications to reduce clutter.
      operationId: notificationsUpdate
      requestBody:
        description: |
          The request body specifies notification IDs to update.  
      
          **Fields**
          - `Unread` *(optional)*: Array of notification IDs (UUIDs) to mark as unread.  
          - `Read` *(optional)*: Array of notification IDs (UUIDs) to mark as read.  
          - `Archive` *(optional)*: Array of notification IDs (UUIDs) to mark as archived.  
      
          **Usage**
          - Provide IDs in one or more arrays depending on which updates you want to apply.  
          - Multiple operations can be applied in a single request.  
          - Helps manage notification lifecycle states in bulk.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationUpdateJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationUpdateJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:notifications
  /notifications/archive:
    post:
      tags:
        - Notification API
      summary: Archive notifications.
      description: |
        Archives one or more notifications by their unique identifiers.  
      
        **Overview**
        - Archived notifications are retained for historical purposes but excluded from active event monitoring.  
        - Notifications can be archived in bulk by passing multiple IDs.  
      
        **Behavior**
        - Requires at least one notification `Id` in the `Archive` array.  
        - Multiple notifications may be archived in a single call.  
        - Archived notifications will no longer appear in `/notifications/{pageSize}/{pageNumber}` queries.  
      
        **Common use cases**
        - Reducing clutter from processed events.  
        - Maintaining a clean active notifications feed.  
        - Archiving events for compliance or auditing while retaining historical data.
      operationId: notificationsArchive
      requestBody:
        description: |
          The request body specifies one or more notification IDs to archive.  
      
          **Fields**
          - `Archive` *(required)*: Array of notification IDs (UUIDs) to be archived.  
      
          **Usage**
          - Use this endpoint after processing notifications to prevent them from appearing in future queries.  
          - Helps manage event lifecycles by distinguishing between active and archived notifications.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationArchiveJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationArchiveJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:notifications

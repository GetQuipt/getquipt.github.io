          description: Invalid input
      security:
        - quipt_auth:
            - write:notifications
  /notifications/archive:
    post:
      tags:
        - Notification API
      summary: Archive notifications.
      description: >-
         This endpoint allows a user to archive a group of notifications.
      operationId: archiveNotifications
      requestBody:
        description: >-
          Archive notifications in batch.
          
          The result of this call creates a job that is processed asynchronously. Retain the ReportId and use getUpdateVirtualInventoryItemsReport to monitor the job's progress.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostNotificationArchiveReq'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostNotificationArchiveResults'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:notifications
  /notifications/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Notification API
      summary: Get job report details by ReportId.  
      description: This endpoint allows a user to retrieve the processing report for any batch notification transaction posted via API, ie Archive.
      operationId: getUpdateNotificationsReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the action response.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNotificationReportResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:notifications
  /catalog/{pageSize}/{pageNumber}:
    get:
      tags:
        - Catalog API
      summary: Search product catalog.
      description: This endpoint allows the user to search our item catalog.
      operationId: getCatalogItems
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: keywords
          in: query
          description: Search terms to locate a matching item.
          required: false
          schema:
            type: string           
        - name: categories
          in: query
          description: >-
            Comma separated list of categories.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: categoryIds
          in: query
          description: >-
            Comma separated list of Quipt category IDs.
          required: false
          schema:
            type: array
            items:
              type: string  
        - name: manufacturers
          in: query
          description: >-
            Comma separated list of manufacturers.
          required: false
          schema:
            type: array
            items:
              type: string  
        - name: brands
          in: query
          description: >-
            Comma separated list of brands.
          required: false
          schema:
            type: array
            items:
              type: string   
        - name: attribute{Suffix}
          in: query
          description: >-
            Comma separated list of attributes. Replace {Suffix} with the attribute code you want to filter on. 
          required: false
          schema:
            type: array
            items:
              type: string      
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Conditions
                - Facets
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetGroupedCatalogResults'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory
  /carriers:
    get:
      tags:
        - Carrier API
      summary: Get supported carriers.
      description: This endpoint allows the user to get our carrier list.
      operationId: getCarriers
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCarrierResults'
        '400':
          description: Invalid request.
  /carriers/methods:
    get:
      tags:
        - Carrier API
      summary: Get supported carrier methods.
      description: This endpoint allows the user to retrieve supported carrier methods.
      operationId: getCarrierMethods
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCarrierMethodResults'
        '400':
          description: Invalid request.
  /carriers/{carrierCodeOrId}/methods:
    get:
      tags:
        - Carrier API
      summary: Get supported carrier methods by carrier.
      description: This endpoint allows the user to retrieve the methods that belong to a specific carrier.
      operationId: getCarrierMethodsByCarrierCodeOrId
      parameters:
        - name: carrierCodeOrId
          in: path
          description: >- 
            The carrier code or Quipt carrier Id. Use getCarriers to get available codes.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCarrierMethodResults'
        '400':
          description: Invalid request.
  /categories:
    get:
      tags:
        - Taxonomy API
      summary: Get root categories.
      description: >-
        Get top level categories defined within Quipt.
      operationId: getRootCategories
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategoryResults'
        '400':
          description: Invalid request.
  /categories/{categoryId}:
    get:
      tags:
        - Taxonomy API
      summary:  Get children categories.
      description: >-
        Get children categories. Used to traverse the category tree. If the intention is to list against the selected category ensure IsLeaf is true.
      operationId: getCategoriesByParentId
      parameters:
        - name: categoryId
          in: path
          description: >- 
            The parent of the next level of categories.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategoryResult'
        '400':
          description: Invalid request.
  # /categories/search:        

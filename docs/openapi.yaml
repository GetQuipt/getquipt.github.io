      summary: Cancel request.
      description: |
        Cancels an existing request, either in full or at the line level.
      
        **Overview**
        - A cancellation request may apply to the entire fulfillment request or specific line items.  
        - Requires a reason code and allows optional free-text explanation.  
        - `ForceCancelation` can be used to override restrictions that might normally prevent cancellation.  
      
        **Behavior**
        - Requires the `Request.Id` to identify the  request being cancelled.  
        - Cancelling specific lines leaves other lines unaffected.  
        - Returns an error if the request ID is invalid, or cancellation is not permitted.
      operationId: purchaseRequestsCancel
      requestBody:
        description: |
          The request body contains one or more **cancel request objects**.
      
          **Fields**
          - `TransactionId` *(optional)*: Correlation identifier for external system tracking.  
          - `Requests` *(required)*: Array of cancellation instructions.  
      
          Each cancellation request includes:
          - **Request** *(required)*: Identifies the fulfillment request to cancel by `Id`.  
          - **Reason** *(required)*: Structured reason for the cancellation.  
            - `Id`: Unique identifier for the reason (nullable).  
            - `Code`: Reason code (e.g., `CUSTREQ` = customer requested).  
            - `Text`: Optional free-text explanation.  
          - **ForceCancelation** *(optional)*: Boolean flag to override restrictions and force cancellation.  
          - **Lines** *(optional)*: Array of line items to cancel. If omitted, the entire request is cancelled. 
          **Usage**
          - Use this endpoint to cancel requests initiated by customers or system events.  
          - Can cancel all lines (full request) or specific lines.  
          - Useful in workflows such as customer cancellation, inventory issues, or fraud prevention.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReqCancelJob'
        required: true
      responses:

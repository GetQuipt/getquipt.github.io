      summary: Create a new request.
      description: |
        Creates one or more requests such as returns, credits, or missing accessory.  
      
        **Overview**
        - A request represents a post-sales transaction (e.g., return, refund, missing accessory, advanced replacement).
        - Use this endpoint to initiate new requests tied to a purchase order, line items, or unidentified items.
        - Requests may include optional notes and user-defined fields to support custom workflows.
      
        **Behavior**
        - Multiple requests can be submitted in a single API call.
        - Each request includes order and line-level details.
        - Unidentified items can be submitted if they are not linked to an existing purchase order.
        - The system generates unique IDs for created requests and returns them in the response.
      operationId: salesRequestAdd
      requestBody:
        description: |
          The request includes one or more **requests**.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqJob'
        required: true
      responses:
        '201':
          description: Successful operation.

        - Reconciling POs between systems using external purchase order numbers.  
        - Quickly retrieving a PO without needing its internal system ID.  
        - Integrating purchase order lookups into vendor/retailer workflows.
      operationId: purchaseOrdersByPO
      parameters:
        - name: poNumber
          in: path
          description: The purchase order number to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
                - Metafields
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/purchase/create:
    post:
      tags:
        - Channel API - Orders
      summary: Create a new purchase order.
      description: |
        Creates one or more purchase orders (POs).  
      
        **Overview**
        - A purchase order (PO) represents an order placed by a retailer or channel with a vendor.  
        - This endpoint accepts one or more POs in a single call, including line items and shipping details.  
      
        **Behavior**
        - A unique `PurchaseOrderNumber` is required for each order.  
        - Each order must include vendor information and shipping address.  
        - Lines define the SKUs, quantities, and pricing.  
        - The system validates address details (ISO or ISO3 must be set) and order structure before creation.  
        - Response includes confirmation of created orders along with their IDs.
      operationId: purchaseOrdersAddUpdate
      requestBody:
        description: |
          The request body contains one or more purchase orders to be created.  
      
          **Fields**
          - `Orders` *(required)*: Array of purchase orders to create.  
      
          Each order includes:
          - **PurchaseOrderNumber** *(required)*: Unique purchase order number.  
          - **Vendor** *(required)*: Vendor details. Either `Id` or `Code` must be provided.  
          - **Group** *(required)*: Grouping and shipping details.  
            - **ReferenceNumber** *(optional)*: Reference number for the order.  
            - **EndCustomerReferenceNumber** *(optional)*: End customer reference number.  
            - **ShipTo** *(required)*: Shipping address. Must include `Company` or `Attention`.  
            - **Gift** *(optional)*: Gift wrap and message details.  
            - **LabelReference1/2** *(optional)*: Reference numbers to include on carrier labels.  
          - **SpecialInstructions** *(optional)*: Notes to include on pick list.  
          - **SignatureOption** *(optional)*: `0 = NO`, `10 = YES`.  
          - **InsuranceOption** *(optional)*: `0 = NO`, `10 = YES`.  
          - **CarrierMethod** *(required)*: Carrier method (use `/carriers` API to fetch valid codes).  
          - **UserDefined1–3** *(optional)*: Custom fields for extensibility.  
          - **Lines** *(required)*: One or more line items in the order.  
            - **Item** *(required)*: SKU of the inventory item.  
            - **Ordered** *(required)*: Quantity ordered (`Value` and `Units`).  
            - **Tax / Miscellaneous / Discount / Freight** *(optional)*: Monetary amounts for the line.  
            - **Price** *(required)*: Per-unit price.  
            - **UserDefined1–3** *(optional)*: Line-level custom fields.  
      
          **Usage**
          - Use this endpoint when creating new purchase orders for vendors.  
          - Supports batch creation of multiple POs in one request.  
          - Ensures vendors have all required details (SKU, quantity, price, shipping address).
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /orders/purchase/acknowledge:
    post:
      tags:
        - Channel API - Orders
      summary: Acknowledge purchase orders.
      description: |
        Records an acknowledgement for one or more purchase orders.  
      
        **Overview**
        - Used to send confirmation or alerts regarding a purchase order.  
        - Each acknowledgement may include either the system `Id` or external `PurchaseOrderNumber` to identify the order.  
        - Supports two acknowledgement types:  
          - `4 = MessageAlert` (an informational alert or issue)  
          - `8 = MessageConfirm` (a confirmation of the order)  
      
        **Behavior**
        - Requires at least one valid order reference (`Id` or `PurchaseOrderNumber`).  
        - Multiple acknowledgements can be submitted in one request.  
        - Response includes success or failure for each acknowledgement processed.  
      
        **Common use cases**
        - Sending confirmation that an order was received.  
        - Notifying vendor/retailer of issues requiring review.  
        - Logging informational notes tied to a purchase order.
      operationId: purchaseOrdersAck
      requestBody:
        description: |
          The request body specifies one or more purchase order acknowledgements.  
      
          **Fields**
          - `Acknowledgements` *(required)*: Array of acknowledgement records.  
      
          Each acknowledgement includes:
          - **Order** *(required)*: Identifies the order to acknowledge by either `Id` (UUID) or `PurchaseOrderNumber`.  
          - **Acknowledgement** *(required)*:  
            - `Type`: Acknowledgement type (4 = MessageAlert, 8 = MessageConfirm).  
            - `Message`: The acknowledgement message text.  
      
          **Usage**
          - Use when confirming receipt of an order or providing a message back to the order originator.  
          - Allows flexible tracking of both confirmations and alerts.  
          - Useful for vendor ↔ retailer communication.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderAckJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderAckJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /orders/purchase/cancel:
    post:
      tags:
        - Channel API - Orders
      summary: Cancel purchase orders.
      description: |
        Cancels one or more purchase orders by providing an order reference and cancellation reason.  
      
        **Overview**
        - Cancels may be performed at the order level by referencing either the system `Id` or external `PurchaseOrderNumber`.  
        - A status code and structured reason must be provided for each cancellation.  
      
        **Behavior**
        - Requires at least one valid order reference (`Id` or `PurchaseOrderNumber`).  
        - `Status` indicates the final state of the cancelled order (e.g., 10 = Approved).  
        - `Reason.Code` determines why the order is being cancelled:  
          - `OTHER` = Other (requires `Text` explanation)  
          - `PRTNR` = Partner requested  
          - `OTSTK` = Out of stock  
        - Multiple orders can be cancelled in one request.  
        - Response includes success or failure for each cancellation processed.  
      
        **Common use cases**
        - Cancelling orders due to stock issues.  
        - Processing partner-initiated cancellations.  
        - Logging reasons for audit and reconciliation.
      operationId: purchaseOrdersCancel
      requestBody:
        description: |
          The request body specifies one or more purchase orders to cancel.  
      
          **Fields**
          - `Orders` *(required)*: Array of cancellation instructions.  
      
          Each cancellation includes:
          - **Order** *(required)*: Identifies the purchase order by either `Id` (UUID) or `PurchaseOrderNumber`.  
          - **Status** *(required)*: Status code of the order after cancellation (e.g., 10 = Approved).  
          - **Reason** *(required)*: Structured cancellation reason.  
            - `Code`: Reason code (`OTHER`, `PRTNR`, `OTSTK`).  
            - `Text`: Required if `Code = OTHER`. Optional otherwise.  
      
          **Usage**
          - Use this endpoint when cancelling orders for operational, inventory, or partner reasons.  
          - Helps ensure vendors and retailers have aligned cancellation records.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCancelJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderCancelJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /orders/purchase/archive:
    post:
      tags:
        - Channel API - Orders
      summary: Archive orders.
      description:  |
        **All orders are automatically archived 90 days after termination.**
  
        Moves one or more sales orders into an **archived state**. 
        
        **Overview**
        - Use this endpoint to archive shipped or canceled.
        - Archived orders are retained for record-keeping but are excluded from active processing and standard list queries.
        - Orders may still be retrieved by ID if needed.
  
        **Behavior**
        - Accepts one or more order IDs in the request body.
        - Partial success allowed if all orders may not be archived.

        **Common use cases**
        - Managing lifecycle of completed or cancelled orders.
        - Keeping historical data for reporting while removing it from active workflows.
      operationId: purchaseOrdersArchive
      requestBody:
        description: |
          The request body specifies one or more purchase orders to process.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderArchiveJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderArchiveJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:requests
  /orders/purchase/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:

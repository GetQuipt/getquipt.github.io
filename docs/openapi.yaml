openapi: 3.0.3
info:
  title: Quipt - OpenAPI 3.0
  description: >-
    View the [wiki](https://getquipt.github.io) for more details.
  version: 2.0.0
servers:
  - url: https://api.getquipt.com/v2
tags:
  - name: Vendor API - Inventory
    description: >- 
      Perform vendor workflows. 
      The inventory services below provide the ability to manage inventory listings within Quipt. 
      The provided services can be used manage everything from quantity synchronization to creating, publishing, and listing the inventory on partner sites. 
    externalDocs:
      description: Find out more about a vendor inventory integration.
      url: https://getquipt.github.io/vendor-api.html#inventory
  - name: Vendor API - Orders
    description: >-
      The order services provide the ability to manage orders expected to be fulfilled by Quipt vendors. 
      The provided services may be used to download, acknowledge, ship, invoice, and cancel orders.
    externalDocs:
      description: Find out more about a vendor order integration.
      url: https://getquipt.github.io/vendor-api.html#orders  
  - name: Vendor API - Shipments
    description: >-
      The shipment services provide a mechanism to manage shipments if your company is using ‘Ship via Quipt’.
      The primary purpose is to download the necessary packing and shipment documents. 
    externalDocs:
      description: Find out more about a vendor shipment integration.
      url: https://getquipt.github.io/vendor-api.html#shipments
  - name: Vendor API - Requests
    description: >-
      The request services below provide the ability to manage requests expected to be completed by Quipt vendors. 
      The provided services can be used to download, acknowledge, and close requests. 
    externalDocs:
      description: Find out more about a vendor request integration.
      url: https://getquipt.github.io/vendor-api.html#requests  
  - name: Channel API - Virtual Inventory
    description: >-
      The inventory services below provide the ability to manage virtual inventory listings within Quipt.
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#inventory
  - name: Channel API - Orders
    description: >-
      The order services provide the ability to manage orders expected to be fulfilled by Quipt vendors. 
      The provided services may be used to download, acknowledge, ship, invoice, and cancel orders. 
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#orders
  - name: Channel API - Requests
    description: >-
      The request services below provide the ability to manage requests expected to be completed by Quipt vendors. 
      The provided services can be used to download, acknowledge, and close requests.
    externalDocs:
      description: Find out more about a channel integration.
      url: https://getquipt.github.io/channel-api.html#requests     
  - name: Catalog API
    description: Search product catalog.
  - name: Notification API
    description: >-
      Within Quipt users may subscribe to a defined set of events that occur throughout the application. 
      When an event is fired a notification is sent to the user. 
      The following API endpoints allow the user to access the notifications generated. 
      Currently the endpoints only allows the user to monitor for new messages and archive those that are no longer needed.

      Sample use cases.

      - Tracking movement through any work flow, ie Orders.

      - Monitor for changes, including price and quantity.
  - name: Carrier API
    description: >-
      Navigate the available carriers and related methods they support. **No authorization required for the endpoints listed below.**
    externalDocs:
      description: View sheet with all carriers and methods.
      url: https://docs.google.com/spreadsheets/d/1qqNOVK_8K12AGUfIlGtWngTC6atZ46UYuurWLPxplpQ
  - name: Taxonomy API
    description: >-
      Navigate our taxonomy. **No authorization required for the endpoints listed below.**
      Categories are arranged in a tree structure, where:<br/>
      - Each category has a unique id.<br/>
      - A category can have multiple child categories.<br/>
      - A category must have IsLeaf: true to have a product assigned to it.
      - Any category may have Attributes associated, but refer to categories with IsLeaf: true to see those required for a category.
    externalDocs:
      description: View taxonomy.
      url: https://getquipt.github.io/taxonomy.html  
paths:
  /inventory/physical:
    post:
      tags:
        - Vendor API - Inventory
      summary: Add or update physical inventory items.
      description: |
        Creates new inventory items or updates existing ones based on the provided SKU or item identifier.  
      
        Use this endpoint to:
        - Add new products into the physical inventory system.
        - Update stock levels, location assignments, or item attributes.

        **Behavior:**
        - If the `SKU` already exists, the item is updated.
        - If the `SKU` does not exist, a new item is created.
        - Partial updates are supported (fields not included remain unchanged).
        
        **Common use cases:**
        - Importing product content.
        - Correcting inventory discrepancies.
        - Updating pricing, allocations or other feed details.
  
        **Asynchronous Processing**
        - The request creates a background job rather than updating immediately.
        - The response includes a `ReportId` which uniquely identifies the job.
        - Use the [`inventoryItemsReport`](#Vendor_API_-_Inventory-inventoryItemsReport) endpoint to monitor job progress and retrieve results.
      operationId: inventoryItemsAddUpdate
      requestBody:
        description: |
          **Required Field**
          - `SKU` – Unique identifier for the inventory item.
          
          **Recommended Fields**
          - `Locations` – Used to manage warehouse quantity/availability.
          - `Feeds` - Used to manage pricing per channel.
          - `Pricing` - Used to manage global pricing, affects all channels.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:inventory
  /inventory/physical/report/{reportId}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Retrieve job report results by ReportId.  
      description: |
        Returns the results of a previously submitted **Add/Update Inventory Items** job.  
  
        **Overview**
        - Use this endpoint to monitor the status and results of asynchronous inventory import jobs.  
        - Each job is identified by a `ReportId` returned from the initial `/inventory/physical` request.  
        - Reports may contain success/failure details for each processed item.  
  
        **Behavior**
        - If the job is still processing, the response includes a `Status`.  
        - Once complete, the report includes item-level results.  
        - Pagination allows retrieval of large job results in chunks.  
  
        **Common use cases**
        - Poll for job completion before updating UI or triggering follow-up processes.  
        - Retrieve error messages for failed items to correct and resubmit. 
      operationId: inventoryItemsReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the `inventoryItemsAddUpdate` response.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory  
  /inventory/physical/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Retrieve physical inventory items (paged).
      description: |
        Returns a paged list of inventory items.
  
        **Overview**
        - Use this endpoint to browse or search your inventory in batches.  
        - Supports pagination through the `pageSize` and `pageNumber` path parameters.  
        - Optional query parameters can filter or refine results (e.g., by `skus`, `ids`, or `statuses`).
  
        **Behavior**
        - Pagination metadata (`PageNumber`, `Total`, and `HasMorePages`) is included in the response.  
  
        **Common use cases**
        - Display paginated results in a UI inventory table.  
        - Synchronize downstream systems by fetching inventory in chunks.  
        - Retrieve subsets of items for reporting or auditing. 
      operationId: inventoryItems
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: skus
          in: query
          description: Comma separated list of SKUs to lookup.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: ids
          in: query
          description: Comma separated list of ids to lookup.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Catalog
                - Feeds
                - Comments
                - History
                - Report
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory
  /inventory/physical/id/{id}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Retrieve a physical inventory item by ID.
      description: |
        Returns the details of a single inventory item identified by its unique `id`.
  
        **Overview**
        - Use this endpoint to fetch all available details for one specific inventory record.
        - The `id` corresponds to the system-assigned unique identifier for the item.
        - Commonly used to display detailed item information in UIs or for integration lookups.
  
        **Behavior**
        - If the item exists, the full record is returned.
        - If no item with the given `id` is found, a `404` error is returned.
  
        **Common use cases**
        - Fetching a single inventory record for editing or auditing.
        - Displaying item details in an admin console or web app.
        - Cross-referencing inventory data when integrating with external systems.
      operationId: inventoryItemsById
      parameters:
        - name: id
          in: path
          description: The id to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Catalog
                - Feeds
                - Comments
                - History
                - Report
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory
  /inventory/GroupAndEnrich:
    post:
      tags:
        - Vendor API - Inventory
      summary: Group and enrich inventory items.
      description: |
        Uploaded a file, aggregated by category, along with a selected template by name. The file 
        is parsed, grouped according to the template configuration, and enriches the data using Quipt’s 
        catalog, partner pricing data, and the partner's existing inventory records. The result is a 
        normalized dataset containing matched Quipt SKUs, grouped inventory units, partner pricing insights, 
        and an estimated recovery value based on Quipt’s pricing model.  Returns the details of a single inventory 
        item identified by its unique `id`.
  
        **Overview**
        - Commonly used to identify how an inventory items can be linked to Quipt catalog. Also, if requested, include current or estimated pricing.
  
        **Behavior**
        - If the item exists, identity Quipt internal catalog id and vendor sku, if exists.
        - If the item does NOT exist, if requested, create a partially completed content file.
  
        **Common use cases**
        - Identify if included items exist in the Quipt catalog.
        - Identify existing skus.
        - If requested, included existing pricing and Quipt model pricing. 
      operationId: inventoryItemsGroupAndEnrich
      requestBody:
        description: Data to upload and template name to use for grouping and enriching the inventory data.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryGroupAndEnrichJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryGroupAndEnrichJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:inventory
  /inventory/GroupAndEnrich/report/{reportId}:
    get:
      tags:
        - Vendor API - Inventory
      summary: Get group and enrich job report details by ReportId.  
      description: |
        Returns the results of a previously submitted **Group And Enrich Inventory Items** job.  
  
        **Overview**
        - Use this endpoint to monitor the status and results of asynchronous inventory import jobs.  
        - Each job is identified by a `ReportId` returned from the initial `/inventory/physical` request.  
        - Reports may contain success/failure details for each processed item.  
  
        **Behavior**
        - If the job is still processing, the response includes a `Status`.  
        - Once complete, the report includes item-level results.  
        - Pagination allows retrieval of large job results in chunks.  
  
        **Common use cases**
        - Poll for job completion before updating UI or triggering follow-up processes.  
        - Retrieve error messages for failed items to correct and resubmit. 
      operationId: inventoryGroupAndEnrichReport
      parameters:
        - name: reportId
          in: path
          description: The ReportId provided by the 'inventoryGroupAndEnrichReport' response.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation. Expect response Paging = null. No paging is used for this endpoint as the full results are returned in a single document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryGroupAndEnrichReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:inventory  
  /orders/fulfillment/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Retrieve fulfillment orders (paged).
      description: |
        Returns a paginated list of orders that are eligible for fulfillment.
  
        **Important**
        - `Lines[] represents what Quipt receives from a channel when orders are received. Due to sku normalization, availability, and pricing Quipt encapsulate details for the vendor within Lines[].Fulfillments[]. To ensure expected data is returned by the endpoint inclusion of '?include=Fulfillments' is required.`
  
        **Overview**
        - Use this endpoint to retrieve orders that require picking, packing, or shipping.
        - Supports pagination with `pageSize` and `pageNumber` path parameters.
        - Optional query parameters may filter orders (e.g., by orderStatus).
  
        **Behavior**
        - Results include metadata (`PageNumber`, `Total`, `HasMorePages`) for pagination.  
        - Orders are returned in a deterministic order (commonly by `createdAt` or `updatedAt`).  
        - If the requested page exceeds available results, an empty list is returned.  
        **Common use cases**
        - Display paginated orders in an admin portal or fulfillment dashboard.  
        - Integrate with a warehouse system for batch picking and packing.  
        - Retrieve subsets of orders for reporting or analytics.  
      operationId: salesOrders
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: orderStatus
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            2 = Pending<br/>
            4 = Open<br/>
            8 = Shipped<br/>
            16 = Canceled
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
                - MetaFields
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/OrderReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/id/{id}:
    get:
      tags:
        - Vendor API - Orders
      summary: Retrieve a fulfillment order by ID.
      description: |
        Returns the details of a single fulfillment order identified by its unique `id`.
  
        **Important**
        - `Lines[] represents what Quipt receives from a channel when orders are received. Due to sku normalization, availability, and pricing Quipt encapsulate details for the vendor within Lines[].Fulfillments[]. To ensure expected data is returned by the endpoint inclusion of '?include=Fulfillments' is required.`
        
        **Overview**
        - Use this endpoint to fetch all available information for one order.
        - The `id` corresponds to the system-assigned unique identifier for the order.
        - Commonly used to display order details in a fulfillment dashboard, verify status,
          or integrate with external systems.
  
        **Behavior**
        - If the order exists, the full order record is returned.
        - If no order with the given `id` is found, a `404` error is returned.
  
        **Common use cases**
        - Displaying full order details in an admin portal.
        - Looking up an order’s fulfillment status for customer service.
        - Cross-referencing order data during warehouse or ERP integration.
      operationId: salesOrdersById
      parameters:
        - name: id
          in: path
          description: The id to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
                - MetaFields
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/PurchaseOrderResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/po/{channelIdOrCode}/{poNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Retrieve a fulfillment order by purchase order number.
      description: |
        Returns the details of a fulfillment order using the **purchase order number (PO)** along with its associated sales channel.
  
        **Important**
        - `Lines[] represents what Quipt receives from a channel when orders are received. Due to sku normalization, availability, and pricing Quipt encapsulate details for the vendor within Lines[].Fulfillments[]. To ensure expected data is returned by the endpoint inclusion of '?include=Fulfillments' is required.`
  
        **Overview**
        - Use this endpoint when you need to fetch an order by its PO number instead of the system `id`.
        - The `channelIdOrCode` parameter identifies the sales channel, managed via partner settings.
        - The `poNumber` parameter is the purchase order number assigned within that channel.
        - Commonly used for B2B workflows where orders are tracked against PO numbers.
  
        **Behavior**
        - If a matching order is found, the full order record is returned.
        - If no matching order exists for the given `channelIdOrCode` + `poNumber`, a `404` error is returned.
  
        **Common use cases**
        - Customer service lookups when a client references their PO number.
        - Reconciling orders between Quipt and an external ERP or sales channel.
        - Validating fulfillment status of wholesale or drop-ship POs.
      operationId: salesOrdersByPO
      parameters:
        - name: channelIdOrCode
          in: path
          description: The id or partner reference to lookup.
          required: true
          schema:
            type: string
        - name: poNumber
          in: path
          description: The purchase order number to lookup.
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
                - MetaFields
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderResult'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/channel/{channelIdOrCode}/{pageSize}/{pageNumber}:
    get:
      tags:
        - Vendor API - Orders
      summary: Retrieve fulfillment orders by channel (paged).
      description: |
        Returns a paginated list of fulfillment orders filtered by a specific sales channel.
  
        **Important**
        - `Lines[] represents what Quipt receives from a channel when orders are received. Due to sku normalization, availability, and pricing Quipt encapsulate details for the vendor within Lines[].Fulfillments[]. To ensure expected data is returned by the endpoint inclusion of '?include=Fulfillments' is required.`
        
        **Overview**
        - Use this endpoint to fetch only the orders associated with a given channel.  
        - Supports pagination via the `pageSize` and `pageNumber` path parameters.  
        - Optional query parameters can further filter results.  

        **Behavior**
        - Orders are returned only if they belong to the specified channel.  
        - Response includes pagination metadata (`PageNumber`, `Total`, `HasMorePages`).  
        - If no orders exist for the channel, an empty list is returned.  
  
        **Common use cases**
        - Building channel-specific dashboards.  
        - Synchronizing orders with a warehouse or ERP on a per-channel basis.  
        - Filtering out irrelevant orders when working with multi-channel fulfillment workflows.
      operationId: salesOrdersByChannel
      parameters:
        - name: channelIdOrCode
          in: path
          description: The id or partner reference to lookup.
          required: true
          schema:
            type: string
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: orderStatus
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            2 = Pending<br/>
            4 = Open<br/>
            8 = Shipped<br/>
            16 = Canceled
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: include
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Invoices
                - Shipments
                - Cancellations
                - PackingSlips
                - ShipByTruckRequests
                - Payments
                - Fulfillments
                - Acknowledgements
                - SubstitutionFor
                - MetaFields
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderReply'
        '400':
          description: Invalid request.
      security:
        - quipt_auth:
            - read:orders
  /orders/fulfillment/acknowledge:
    post:
      tags:
        - Vendor API - Orders
      summary: Ability to accept, rejected, or back order.
      description: |
        Allows you to **accept**, **reject**, or **back order** a sales order received through a fulfillment channel.
    
        **Overview**
        - Use this endpoint to confirm to the vendor whether you will fulfill the order, reject it, or mark it as back ordered.
        - The request must specify the acknowledgment status and may include optional notes for additional context.
        - The vendor will use this response to update order status in their system.
    
        **Common use cases**
        - Confirming a new order can be fulfilled.
        - Informing the vendor of insufficient stock (backorder).
        - Declining an order when it cannot be processed.
      operationId: salesOrdersAck
      requestBody:
        description: |
          The request body contains one or more **order acknowledgements**.  
      
          Each acknowledgement specifies:
          - **Lines**: Line-level acknowledgements for individual SKUs, which may be:
            - **Accepted**: Includes expected ship date and accepted quantity.  
            - **Rejected**: Includes rejection reason, optional serials, and quantity rejected.  
            - **BackOrdered**: Includes promised date and backordered quantity.  
      
          The `TransactionId` may be provided to correlate this acknowledgement request with other transactions for traceability.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderAckJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderAckJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders
  /orders/fulfillment/ship:
    post:
      tags:
        - Vendor API - Orders
      summary: Mark orders as shipped.
      description: |
        Updates one or more sales orders by providing shipment details.
  
        **Overview**
        - Use this endpoint to notify the channel that an order has been shipped.
        - Multiple orders may be shipped in a single request (batch support).
  
        **Common use cases**
        - Sending tracking numbers back to the channel once labels are generated.
        - Synchronizing warehouse management systems with the sales channel.
        - Batch-confirming a group of orders shipped at the same time.
      operationId: salesOrdersShip
      requestBody:
        description: |
          The request body contains one or more **shipments**.  
      
          Each shipment includes:
          - **Packages**: One or more packages in the shipment, each containing:
            - **Lines**: Line items shipped, including SKU, shipped quantity, and optional serial numbers.  
            - **CarrierMethod**: Carrier and service details (e.g., UPS Ground, FedEx 2-Day).  
            - **TrackingNumber**: Tracking identifier provided by the carrier.  
            - **Shipping**: Shipping cost or quantity metrics, if applicable.  

          The optional `TransactionId` may be included to correlate the shipment with other transactions.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderShipJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderShipJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders   
  /orders/fulfillment/invoice:
    post:
      tags:
        - Vendor API - Orders
      summary: Submit invoices for orders.
      description: |
        Creates one or more invoices for previously shipped orders.
  
        **Overview**
        - Use this endpoint to report invoicing activity back to the channel.
        - Each request may include one or multiple invoices.
  
        **Behavior**
        - If the `id` or `purchaseOrderNumber` is valid, the invoice is accepted and recorded.
        - If the order is not found or the invoice payload is invalid, an error is returned.
        - Partial success is possible when some invoices are valid while others fail.
  
        **Common use cases**
        - Submitting invoices after shipping an order.
        - Synchronizing ERP or accounting systems with vendor records.
        - Providing invoice metadata for reconciliation and reporting.
      operationId: salesOrdersInvoice
      requestBody:
        description: |
          The request body contains one or more **invoices**.
      
          Each invoice includes:
          - **Lines**: Individual line items being invoiced, with SKU, invoiced quantity, and price.  
          - **InvoiceNumber**: Vendor’s invoice reference number.  
          - **InvoicedAt**: Date and time when the invoice was issued.  
          - **Shipping / Tax / Discount / Miscellaneous / Total**: Monetary amounts that make up the final invoice value.  
      
          The optional `TransactionId` can be included to correlate this invoice with external systems or batch processes.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesOrderInvoiceJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderInvoiceJobReply'
        '400':
          description: Invalid input
      security:
        - quipt_auth:
            - write:orders
  /orders/fulfillment/archive:

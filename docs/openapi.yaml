      summary: Archive orders.
      description:  |
        **All orders are automatically archived 90 days after termination.**
  
        Moves one or more sales orders into an **archived state**. 
        
        **Overview**
        - Use this endpoint to archive shipped or canceled.
        - Archived orders are retained for record-keeping but are excluded from active processing and standard list queries.
        - Orders may still be retrieved by ID if needed.
  
        **Behavior**

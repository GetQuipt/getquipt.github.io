          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: includeLines
          in: query
          description: Whether or not to include line details with report.
          required: false
          schema:
            type: boolean    
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryVirtualJobReply'
        '400':

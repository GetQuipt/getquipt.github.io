  /notifications/{pageSize}/{pageNumber}:
    get:
      tags:
        - Notification API
      summary: Get notifications/events (paged).
      description: |
        Retrieves a paginated list of notifications (events).  
      
        **Overview**
        - Notifications represent system events triggered by actions on records such as orders, inventory, or requests.  
        - Each notification contains an event type, the affected record, timestamp, and partner details.  
        - The API user must be subscribed to events in the **web application** in order to receive them.  
      
        **Behavior**
        - Requires `pageSize` and `pageNumber` as path parameters.  
        - Returns notifications with pagination metadata.  
        - If no results exist for the requested page, an empty `Result` array is returned.  
      
        **Common use cases**
        - Monitoring new events for integrations.  
        - Synchronizing external systems with Quipt updates.  
        - Auditing recent activity across vendors, partners, or channels.
      operationId: notifications
      parameters:
        - name: pageSize
          in: path
          description: The number of items to return.
          required: true
          schema:
            type: integer
            format: int32
        - name: pageNumber
          in: path
          description: The page of items to return.
          required: true
          schema:
            type: integer
            format: int32  
        - name: statuses
          in: query
          description: >- 
            A comma separated list of statuses.<br/>
            1 = Unread<br/>
            2 = Read<br/>
            4 = Archived
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
        - name: types
          in: query
          description: >-
            Comma separated list of options. If option not included the property will be returned as null.
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - Batch
                - Blog
                - Report
                - PurchaseOrder
                - SalesOrder
                - Virtual Inventory
                - PhysicalInventory
                - Feeds 
                - ChannelRequest
                - VendorRequest
      responses:
        '200':
          description: |
            Successful operation. 
            The API provides a mechanism to get more details of each referenced Type. 
            Using the links below locate the referenced Type and use response RecordId as request id for appropriate call.


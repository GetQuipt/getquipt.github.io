  /requests/fulfillment/acknowledge:
    post:
      tags:
        - Vendor API - Requests
      summary: Acknowledge requests.
      description: |
        Records an acknowledgement for one or more requests.  
  
        **Overview**
        - Acknowledgement indicates that the request (such as a return, refund, lost shipment, intercept, or missing accessory) has been **reviewed**.  
        - Each acknowledgement is tied to a specific request ID.  
  
        **Behavior**
        - Supports batch acknowledgements by passing multiple request IDs in one payload.  
        - Returns success/failure for each acknowledgement processed.  
        - Requests that cannot be found or acknowledged will be reported in the response.  
  
        **Common use cases**
        - Marking customer service requests as acknowledged in a back-office system.  
        - Synchronizing request statuses between external systems and Quipt.  
        - Tracking workflow actions taken on returns, refunds, or shipment issues. 
      operationId: salesRequestsAck
      requestBody:
        description: |
          The request body contains one or more **request acknowledgements**.
      
          Each acknowledgement includes:
          - **Lines**: One or more line items being acknowledged.  
            - **SKU**: Identifies the product being acknowledged.  
            - **Accepted**: Quantity details for items accepted.  
            - **Rejected**: Reason code, reason text, and quantity for items rejected.  
            - **Id**: Optional unique identifier for the line item (nullable if not available).  
      
          **Usage**
          - Use this endpoint to confirm which items within a request are accepted or rejected.  
          - Both accepted and rejected sections may appear on the same line to provide partial acceptance details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReqAckJob'
        required: true
      responses:
        '201':
          description: Successful operation.
          content:
